name: OpenAPI Spec Crawler

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max_results:
        description: "Max results per search query (default: 100)"
        required: false
        default: "100"
      data_dir:
        description: "Data directory path (default: data)"
        required: false
        default: "data"

concurrency:
  group: crawler
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl OpenAPI Specs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.CRAWLER }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          python scripts/run_crawler.py \
            --max-results ${{ github.event.inputs.max_results || '100' }} \
            --data-dir ${{ github.event.inputs.data_dir || 'data' }}

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-catalog-${{ github.run_id }}
          path: |
            data/catalog.json
            data/history/
          retention-days: 30
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/history/ || true
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore: update catalog [skip ci] (run ${{ github.run_id }})"
            git push
          fi