name: OpenAPI Spec Crawler

on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      max_results:
        description: "Max results per search query (default: 100)"
        required: false
        default: "100"
      data_dir:
        description: "Data directory path (default: data)"
        required: false
        default: "data"

# Only one crawler run at a time to prevent catalog conflicts
concurrency:
  group: crawler
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl OpenAPI Specs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Force Node.js 24 for all actions to suppress deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write    # needed to commit updated catalog back to repo

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git commit works correctly
          fetch-depth: 0

      # ----------------------------------------------------------------
      # 2. Set up Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ----------------------------------------------------------------
      # 3. Install dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run test suite (fail fast before running the crawler)
      # ----------------------------------------------------------------
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      # ----------------------------------------------------------------
      # 5. Run crawler
      # ----------------------------------------------------------------
      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.CRAWLER }}
        run: |
          python scripts/run_crawler.py \
            --max-results ${{ github.event.inputs.max_results || '100' }} \
            --data-dir ${{ github.event.inputs.data_dir || 'data' }}

      # ----------------------------------------------------------------
      # 6. Upload catalog as a build artifact (retained for 30 days)
      # ----------------------------------------------------------------
      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-catalog-${{ github.run_id }}
          path: |
            data/catalog.json
            data/history/
          retention-days: 30

      # ----------------------------------------------------------------
      # 7. Commit updated catalog back to the repository
      #    (only if catalog.json changed)
      # ----------------------------------------------------------------
      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/catalog.json data/history/ || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore: update catalog [skip ci] (run ${{ github.run_id }})"
            git push
          fi